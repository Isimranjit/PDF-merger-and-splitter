name: Build Windows EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install customtkinter pypdf tkinterdnd2 pyinstaller
      - name: Build EXE
        run: |
          pyinstaller --noconsole --onefile --collect-all customtkinter --collect-all tkinterdnd2 --name "PDF_Studio_Pro" PDFtool.py
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Windows-Executable
          path: dist/PDFTool.exe
